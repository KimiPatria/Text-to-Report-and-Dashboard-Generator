<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPMS AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:          #f6f8fa;
  --surface:     #ffffff;
  --border:      #d0d7de;
  --border-s:    #eaedf0;
  --text:        #24292f;
  --muted:       #57606a;
  --accent:      #4f46e5;
  --accent-dim:  rgba(79,70,229,.08);
  --accent-glow: rgba(79,70,229,.22);
  --error:       #cf222e;
  --error-bg:    #fff0f0;
  --warn-bg:     #fffbeb;
  --warn-border: #fde68a;
  --r:           8px;
  --font:        'Inter', system-ui, sans-serif;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex; flex-direction: column;
  font-size: 14px; line-height: 1.5;
}

/* ── HEADER ──────────────────────────────────────────────────────── */
.app-header {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent); font-size: 15px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.app-name  { font-weight: 700; font-size: 14px; letter-spacing: -.3px; }
.app-sep   { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
.app-sub   { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ── NAV ─────────────────────────────────────────────────────────── */
.app-nav {
  display: flex; align-items: center; gap: 2px; margin-left: 4px;
}
.app-nav a {
  font-size: 12px; font-weight: 500;
  color: var(--muted); text-decoration: none;
  padding: 4px 10px; border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.app-nav a:hover { background: var(--accent-dim); color: var(--accent); }
.app-nav a.nav-active {
  background: var(--accent-dim); color: var(--accent); font-weight: 600;
}

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.provider-pill {
  font-size: 11px; color: var(--muted);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 99px; padding: 2px 10px;
}
.fallback-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ef4444; transition: background .3s; flex-shrink: 0; cursor: default;
}
.fallback-dot.active { background: #22c55e; }

/* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
.chat-main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  max-width: 820px; width: 100%; margin: 0 auto;
  padding: 0 16px;
}

/* ── MESSAGES AREA ───────────────────────────────────────────────── */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px 0 12px;
  display: flex; flex-direction: column; gap: 20px;
}
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 3px;
}

/* ── WELCOME SCREEN ──────────────────────────────────────────────── */
.welcome {
  margin: auto; text-align: center; padding: 40px 20px;
}
.welcome-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--accent); font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.welcome h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.welcome p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip {
  font-size: 12px; font-weight: 500; color: var(--accent);
  background: var(--accent-dim); border: 1px solid var(--accent-glow);
  border-radius: 99px; padding: 6px 14px; cursor: pointer;
  transition: background .15s, box-shadow .15s; white-space: nowrap;
}
.chip:hover { background: rgba(79,70,229,.15); box-shadow: 0 0 0 2px var(--accent-glow); }

/* ── USER BUBBLE ─────────────────────────────────────────────────── */
.msg-row { display: flex; }
.msg-row.user { justify-content: flex-end; }
.msg-row.ai   { justify-content: flex-start; align-items: flex-start; gap: 10px; }

.user-bubble {
  max-width: 72%; background: var(--accent); color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 16px; font-size: 14px; line-height: 1.55;
  word-break: break-word;
}

/* ── AI BUBBLE ───────────────────────────────────────────────────── */
.ai-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.ai-bubble-wrap { flex: 1; min-width: 0; max-width: calc(100% - 40px); }
.ai-bubble {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px 18px 18px 18px;
  padding: 14px 16px; font-size: 14px; line-height: 1.6;
  word-break: break-word;
}

/* answer text formatting */
.answer-section-head {
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--accent);
  margin: 12px 0 4px;
}
.answer-section-head:first-child { margin-top: 0; }
.answer-para { margin-bottom: 6px; color: var(--text); }
.answer-list { padding-left: 18px; margin-bottom: 6px; }
.answer-list li { margin-bottom: 3px; color: var(--text); }

/* error / warning inline */
.ai-bubble.error-bubble {
  border-color: var(--border); background: var(--bg);
  color: var(--muted);
}
.ai-bubble.warn-bubble {
  border-color: var(--warn-border); background: var(--warn-bg);
}

/* ── BUBBLE ACTIONS ──────────────────────────────────────────────── */
.bubble-actions {
  display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.toggle-btn {
  font-size: 11px; font-weight: 500; color: var(--muted);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; cursor: pointer;
  transition: background .15s, color .15s; white-space: nowrap;
}
.toggle-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-glow); }
.toggle-btn.open  { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-glow); }

/* ── DATA TABLE ──────────────────────────────────────────────────── */
.data-section, .sql-section { display: none; margin-top: 10px; }
.data-section.open, .sql-section.open { display: block; }

.tbl-wrap {
  overflow-x: auto; border-radius: var(--r);
  border: 1px solid var(--border-s);
  max-height: 260px; overflow-y: auto;
}
.tbl-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
.tbl-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.data-tbl {
  border-collapse: collapse; font-size: 12px;
  width: 100%; white-space: nowrap;
}
.data-tbl thead { position: sticky; top: 0; background: var(--bg); z-index: 1; }
.data-tbl th {
  padding: 7px 12px; text-align: left; font-weight: 600;
  color: var(--muted); border-bottom: 1px solid var(--border);
  font-size: 11px; letter-spacing: .3px;
}
.data-tbl td {
  padding: 6px 12px; border-bottom: 1px solid var(--border-s); color: var(--text);
}
.data-tbl tbody tr:last-child td { border-bottom: none; }
.data-tbl tbody tr:hover td { background: var(--accent-dim); }
.tbl-more {
  font-size: 11px; color: var(--muted); padding: 6px 12px;
  border-top: 1px solid var(--border-s); background: var(--bg);
}

/* ── SQL CODE ────────────────────────────────────────────────────── */
.sql-pre {
  font-family: 'Courier New', monospace; font-size: 12px;
  background: #1e1e2e; color: #cdd6f4;
  padding: 12px 14px; border-radius: var(--r);
  overflow-x: auto; white-space: pre; line-height: 1.6;
}

/* ── LOADING BUBBLE ──────────────────────────────────────────────── */
.loading-bubble .ai-bubble {
  display: flex; align-items: center; gap: 6px; min-height: 44px;
}
.dots { display: flex; gap: 5px; align-items: center; }
.dots span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  animation: pulse 1.2s infinite ease-in-out;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse {
  0%, 80%, 100% { opacity: .25; transform: scale(.8); }
  40% { opacity: 1;   transform: scale(1); }
}

/* ── INPUT BAR ───────────────────────────────────────────────────── */
.chat-input-bar {
  display: flex; align-items: flex-end; gap: 10px;
  padding: 12px 0 20px;
  border-top: 1px solid var(--border-s);
  background: var(--bg);
}
.msg-textarea {
  flex: 1; resize: none; overflow: hidden;
  font-family: var(--font); font-size: 14px;
  padding: 10px 14px; line-height: 1.5;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r);
  outline: none; transition: border-color .2s;
  min-height: 42px; max-height: 160px;
}
.msg-textarea:focus { border-color: var(--accent); }
.msg-textarea::placeholder { color: var(--muted); }
.send-btn {
  flex-shrink: 0; height: 42px; padding: 0 20px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r);
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
  white-space: nowrap;
}
.send-btn:hover:not(:disabled) { opacity: .88; }
.send-btn:disabled { opacity: .45; cursor: default; }

/* ── TOAST ───────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #1e1e2e; color: #cdd6f4;
  padding: 10px 20px; border-radius: var(--r);
  font-size: 13px; z-index: 999; pointer-events: none;
  opacity: 0; transition: opacity .25s; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .chat-main { padding: 0 10px; }
  .app-nav a { padding: 4px 7px; }
  .app-sub, .app-sep { display: none; }
  .user-bubble { max-width: 88%; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-mark">💬</div>
  <span class="app-name">EPMS AI</span>
  <div class="app-sep"></div>
  <span class="app-sub">Data Chatbot</span>
  <nav class="app-nav">
    <a href="/">Dashboard</a>
    <a href="/report">Report</a>
    <a href="/chat" class="nav-active">Chat</a>
  </nav>
  <div class="header-right">
    <span class="fallback-dot" id="fallback-dot" title="LLM Fallback: OFF"></span>
    <span class="provider-pill" id="provider-pill">—</span>
  </div>
</header>

<main class="chat-main">
  <div class="chat-messages" id="chat-messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">💬</div>
      <h2>Ask your plantation data anything</h2>
      <p>I'll query the database, show you the results, and explain what I find.</p>
      <div class="chip-row">
        <div class="chip" onclick="useChip(this)">Total harvest last 30 days</div>
        <div class="chip" onclick="useChip(this)">How many active employees per estate?</div>
        <div class="chip" onclick="useChip(this)">Which blocks had the most ripe bunches?</div>
        <div class="chip" onclick="useChip(this)">Harvest ripeness rate by division</div>
      </div>
    </div>
  </div>

  <div class="chat-input-bar">
    <textarea id="msg-input" class="msg-textarea" rows="1"
      placeholder="Ask anything about your plantation data…"></textarea>
    <button id="send-btn" class="send-btn" onclick="handleSend()">Send</button>
  </div>
</main>

<div id="toast"></div>

<script>
'use strict';

let busy = false;

/* ── chip shortcut ────────────────────────────────────────────────── */
function useChip(el) {
  const ta = document.getElementById('msg-input');
  ta.value = el.textContent.trim();
  grow(ta);
  ta.focus();
}

/* ── textarea auto-grow ───────────────────────────────────────────── */
function grow(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

/* ── send ─────────────────────────────────────────────────────────── */
async function handleSend() {
  const ta = document.getElementById('msg-input');
  const msg = ta.value.trim();
  if (!msg || busy) return;

  busy = true;
  document.getElementById('send-btn').disabled = true;
  setFallbackDot(false);

  document.getElementById('welcome')?.remove();

  addUserBubble(msg);
  ta.value = '';
  ta.style.height = 'auto';

  const loadEl = addLoadingBubble();
  scrollEnd();

  try {
    const data = await postMessage(msg);
    loadEl.remove();
    addAiBubble(data);
    setFallbackDot(!!data.used_llm_fallback);
    if (data.provider_label || data.provider) {
      document.getElementById('provider-pill').textContent =
        data.provider_label || data.provider;
    }
  } catch (err) {
    loadEl.remove();
    addErrorBubble(typeof err === 'string' ? err : err.message);
  } finally {
    busy = false;
    document.getElementById('send-btn').disabled = false;
    scrollEnd();
  }
}

/* ── fetch ────────────────────────────────────────────────────────── */
async function postMessage(msg) {
  const res = await fetch('/chat/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg }),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.detail || `Server error ${res.status}`);
  }
  return res.json();
}

/* ── bubble builders ──────────────────────────────────────────────── */
function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
  msgs().appendChild(row);
}

function addLoadingBubble() {
  const row = document.createElement('div');
  row.className = 'msg-row ai loading-bubble';
  row.innerHTML = `
    <div class="ai-avatar">AI</div>
    <div class="ai-bubble-wrap">
      <div class="ai-bubble">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  msgs().appendChild(row);
  return row;
}

function addAiBubble(data) {
  const isError = !!data.error_type;
  const bubbleClass = data.error_type === 'off_domain'
    ? 'ai-bubble error-bubble'
    : data.error_type === 'no_data'
      ? 'ai-bubble warn-bubble'
      : 'ai-bubble';

  const answerHtml = formatAnswer(data.answer || '');

  let actionsHtml = '';
  let dataHtml    = '';
  let sqlHtml     = '';

  if (!isError && data.columns && data.columns.length > 0 && data.rows && data.rows.length > 0) {
    const label = `${data.row_count > 100 ? 'first 100 of ' + data.row_count : data.row_count} row${data.row_count !== 1 ? 's' : ''}`;
    actionsHtml += `<button class="toggle-btn" onclick="toggleSection(this,'data-sec-${_uid}')">Show data (${label})</button>`;
    dataHtml = `<div class="data-section" id="data-sec-${_uid}">${mkTable(data.columns, data.rows)}</div>`;
  }

  if (data.sql) {
    actionsHtml += `<button class="toggle-btn" onclick="toggleSection(this,'sql-sec-${_uid}')">Show SQL</button>`;
    sqlHtml = `<div class="sql-section" id="sql-sec-${_uid}"><pre class="sql-pre">${esc(data.sql)}</pre></div>`;
  }

  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="ai-avatar">AI</div>
    <div class="ai-bubble-wrap">
      <div class="${bubbleClass}">
        <div class="answer-body">${answerHtml}</div>
        ${actionsHtml ? `<div class="bubble-actions">${actionsHtml}</div>` : ''}
        ${dataHtml}
        ${sqlHtml}
      </div>
    </div>`;

  _uid++;
  msgs().appendChild(row);
}

function addErrorBubble(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="ai-avatar">AI</div>
    <div class="ai-bubble-wrap">
      <div class="ai-bubble error-bubble">${esc(msg)}</div>
    </div>`;
  msgs().appendChild(row);
}

/* ── answer text formatter — generic markdown-lite ────────────────── */
function formatAnswer(text) {
  // Render **bold**, bullet lists, and paragraphs. No fixed section headers.
  const lines = text.split('\n');
  let html = '';
  let inList = false;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) {
      if (inList) { html += '</ul>'; inList = false; }
      continue;
    }

    // Bullet line: •  -  *  or numbered  1.  1)
    if (/^[•\-\*]/.test(line) || /^\d+[\.\)]\s/.test(line)) {
      if (!inList) { html += '<ul class="answer-list">'; inList = true; }
      const content = line.replace(/^[•\-\*]\s*|^\d+[\.\)]\s*/, '');
      html += `<li>${inlineFmt(content)}</li>`;
      continue;
    }

    if (inList) { html += '</ul>'; inList = false; }
    html += `<p class="answer-para">${inlineFmt(line)}</p>`;
  }

  if (inList) html += '</ul>';
  return html || `<p class="answer-para">${inlineFmt(text)}</p>`;
}

function inlineFmt(text) {
  // **bold** and escape everything else
  return esc(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

/* ── toggle data / sql sections ───────────────────────────────────── */
function toggleSection(btn, sectionId) {
  const sec = document.getElementById(sectionId);
  if (!sec) return;
  const open = sec.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) {
    const isData = sectionId.startsWith('data-sec-');
    btn.textContent = btn.textContent.replace(/^(Show|Hide)/, open ? 'Hide' : 'Show');
  } else {
    btn.textContent = btn.textContent.replace(/^(Show|Hide)/, 'Show');
  }
}

/* ── table builder ────────────────────────────────────────────────── */
function mkTable(cols, rows) {
  const MAX   = 200;
  const shown = rows.slice(0, MAX);
  const ths   = cols.map(c => `<th>${esc(String(c))}</th>`).join('');
  const trs   = shown.map(r =>
    `<tr>${cols.map(c => `<td>${esc(str(r[c]))}</td>`).join('')}</tr>`
  ).join('');
  const more  = rows.length > MAX
    ? `<div class="tbl-more">Showing ${MAX} of ${rows.length} rows</div>` : '';
  return `<div class="tbl-wrap">
    <table class="data-tbl"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
  </div>${more}`;
}

/* ── utils ────────────────────────────────────────────────────────── */
let _uid = 0;

function msgs() { return document.getElementById('chat-messages'); }

function scrollEnd() {
  const el = msgs();
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function str(v) {
  if (v === null || v === undefined) return '';
  return String(v);
}

function setFallbackDot(active) {
  const dot = document.getElementById('fallback-dot');
  if (!dot) return;
  dot.classList.toggle('active', !!active);
  dot.title = active ? 'LLM Fallback: ON' : 'LLM Fallback: OFF';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

/* ── keyboard ─────────────────────────────────────────────────────── */
document.getElementById('msg-input').addEventListener('input', function () {
  grow(this);
});
document.getElementById('msg-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    handleSend();
  }
});

/* ── boot ─────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  fetch('/health')
    .then(r => r.json())
    .then(d => {
      const pill = document.getElementById('provider-pill');
      if (d.provider) pill.textContent = d.provider;
    })
    .catch(() => {});
});
</script>
</body>
</html>
